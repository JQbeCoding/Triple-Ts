name: Sync to Jira
on:
  issues:
    types: [opened]

jobs:
  sync-job:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Sync Github Issues to Jira
        uses: jordansilva/github-action-issue-to-jira@v1.1.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        with:
          jiraHost: ${{ secrets.JIRAHOST }}
          jiraUsername: ${{ secrets.JIRAEMAIL }}
          jiraPassword: ${{ secrets.JIRATOKEN }}
          project: TTT
